<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iris Predictor</title>
    <style>
    body {
        /* This uses a high-quality nature image from Unsplash */
        background-image: url('https://images.unsplash.com');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: rgba(255, 255, 255, 0.9); /* Semi-transparent white */
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        text-align: center;
        width: 350px;
    }

    h2 { color: #2d5a27; margin-bottom: 20px; }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box; /* Ensures padding doesn't affect width */
    }

    button {
        width: 100%;
        background-color: #4CAF50;
        color: white;
        padding: 14px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s;
    }

    button:hover { background-color: #388E3C; }

    .result {
        margin-top: 25px;
        padding: 10px;
        background-color: #e8f5e9;
        border-radius: 5px;
        color: #2e7d32;
        font-weight: bold;
    }
</style>

</head>
<body>
    <div class="container">
        <h2>Iris Classifier</h2>
        <form action="/predict" method="post">
            <input type="number" step="0.1" name="sl" placeholder="Sepal Length (cm)" required>
            <input type="number" step="0.1" name="sw" placeholder="Sepal Width (cm)" required>
            <input type="number" step="0.1" name="pl" placeholder="Petal Length (cm)" required>
            <input type="number" step="0.1" name="pw" placeholder="Petal Width (cm)" required>
            <button type="submit">Predict Species</button>
        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>

</html>
